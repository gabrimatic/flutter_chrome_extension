name: Extension checks

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  flutter:
    name: Flutter web extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build extension
        run: ./tool/build_extension.sh

      - name: Verify extension artifact
        run: dart run tool/verify_extension_build.dart
